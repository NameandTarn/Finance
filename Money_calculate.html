<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Counter for Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
        }
        .currency-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <h1 class="text-2xl font-bold text-slate-800 mb-2 text-center">โปรแกรมคำนวณเงินสด</h1>
            <p class="text-slate-500 text-center text-sm">สำหรับฝ่ายการเงิน - คำนวณเหรียญและธนบัตร</p>
            
            <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-100">
                <div class="flex justify-between items-center">
                    <span class="text-blue-700 font-medium text-lg">ยอดรวมสุทธิ:</span>
                    <span id="grand-total" class="text-3xl font-bold text-blue-800">0.00</span>
                </div>
            </div>
        </div>

        <!-- Configuration -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-100">
            <div class="flex items-center justify-between">
                <label class="text-slate-700 font-medium">จำนวนเหรียญต่อกอง (ค่าตั้งต้น):</label>
                <input type="number" id="stack-size" value="10" 
                       class="w-20 p-2 text-center border border-slate-200 rounded-lg currency-input"
                       onchange="calculateTotal()">
            </div>
        </div>

        <!-- Cash Inputs -->
        <div class="space-y-4">
            <!-- Section: Banknotes -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
                <div class="bg-slate-50 px-6 py-3 border-b border-slate-100">
                    <h2 class="font-semibold text-slate-700 uppercase tracking-wider text-xs">ธนบัตร (Banknotes)</h2>
                </div>
                <div class="p-6 space-y-4" id="banknote-container">
                    <!-- JS will populate -->
                </div>
            </div>

            <!-- Section: Coins -->
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
                <div class="bg-slate-50 px-6 py-3 border-b border-slate-100">
                    <h2 class="font-semibold text-slate-700 uppercase tracking-wider text-xs">เหรียญ (Coins)</h2>
                </div>
                <div class="p-6 space-y-4" id="coin-container">
                    <!-- JS will populate -->
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-8 flex gap-4">
            <button onclick="resetForm()" class="flex-1 py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl transition-colors">
                ล้างค่าทั้งหมด
            </button>
            <button onclick="copySummary()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-200">
                คัดลอกสรุปผล
            </button>
        </div>

        <!-- Message Box -->
        <div id="msg-box" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full opacity-0 transition-opacity pointer-events-none">
            คัดลอกลงคลิปบอร์ดแล้ว
        </div>
    </div>

    <script>
        const denominations = {
            banknotes: [1000, 500, 100, 50, 20],
            coins: [10, 5, 2, 1, 0.50, 0.25]
        };

        function init() {
            renderSection('banknote-container', denominations.banknotes, 'bank');
            renderSection('coin-container', denominations.coins, 'coin');
            calculateTotal();
        }

        function renderSection(containerId, values, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = values.map(val => `
                <div class="flex flex-col sm:flex-row sm:items-center gap-4 py-2 border-b border-slate-50 last:border-0">
                    <div class="w-24 font-bold text-slate-700">
                        ${val >= 1 ? val + ' บาท' : (val * 100) + ' สต.'}
                    </div>
                    
                    <div class="flex-1 grid grid-cols-2 gap-4">
                        <div class="relative">
                            <span class="absolute -top-5 left-0 text-[10px] text-slate-400 uppercase">กอง</span>
                            <input type="number" step="any" placeholder="กอง" 
                                   class="w-full p-2 border border-slate-200 rounded-lg currency-input text-center"
                                   data-val="${val}" data-mode="stack" oninput="calculateTotal()">
                        </div>
                        <div class="relative">
                            <span class="absolute -top-5 left-0 text-[10px] text-slate-400 uppercase">เศษ/ใบ</span>
                            <input type="number" step="any" placeholder="จำนวน" 
                                   class="w-full p-2 border border-slate-200 rounded-lg currency-input text-center"
                                   data-val="${val}" data-mode="single" oninput="calculateTotal()">
                        </div>
                    </div>

                    <div class="w-full sm:w-32 text-right">
                        <span class="text-xs text-slate-400 block sm:hidden">รวมรายประเภท:</span>
                        <span id="subtotal-${val}" class="font-mono font-semibold text-slate-600">0.00</span>
                    </div>
                </div>
            `).join('');
        }

        function calculateTotal() {
            const stackSize = parseFloat(document.getElementById('stack-size').value) || 10;
            let grandTotal = 0;
            
            // Get all inputs
            const inputs = document.querySelectorAll('input[data-val]');
            const valueMap = {};

            inputs.forEach(input => {
                const val = input.dataset.val;
                const mode = input.dataset.mode;
                const count = parseFloat(input.value) || 0;

                if (!valueMap[val]) valueMap[val] = 0;

                if (mode === 'stack') {
                    valueMap[val] += (count * stackSize * parseFloat(val));
                } else {
                    valueMap[val] += (count * parseFloat(val));
                }
            });

            // Update subtotals and grand total
            for (const val in valueMap) {
                const sub = valueMap[val];
                document.getElementById(`subtotal-${val}`).innerText = sub.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                grandTotal += sub;
            }

            document.getElementById('grand-total').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function resetForm() {
            document.querySelectorAll('input[data-val]').forEach(i => i.value = '');
            calculateTotal();
        }

        function copySummary() {
            const total = document.getElementById('grand-total').innerText;
            const stackSize = document.getElementById('stack-size').value;
            let summary = `สรุปยอดเงินสด (จำนวนต่อกอง: ${stackSize})\n`;
            summary += `----------------------------\n`;
            
            const rows = document.querySelectorAll('div[class*="border-b border-slate-50"]');
            rows.forEach(row => {
                const label = row.querySelector('.w-24').innerText.trim();
                const sub = row.querySelector('[id^="subtotal"]').innerText;
                if (sub !== "0.00") {
                    summary += `${label}: ${sub} บาท\n`;
                }
            });
            
            summary += `----------------------------\n`;
            summary += `ยอดรวมสุทธิ: ${total} บาท`;

            const el = document.createElement('textarea');
            el.value = summary;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const msg = document.getElementById('msg-box');
            msg.style.opacity = '1';
            setTimeout(() => msg.style.opacity = '0', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
